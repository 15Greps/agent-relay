name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Build all platforms
        env:
          RELAY_TOKEN: ${{ secrets.RELAY_TOKEN || 'AGENTFORMS_RELAY_TOKEN' }}
        run: make build-all

      - name: Create release package
        run: |
          mkdir -p dist
          cp relay-* dist/
          cp README.md dist/
          cp LICENSE dist/
          cp install.sh dist/
          cp install.ps1 dist/
          cd dist && sha256sum * > SHA256SUMS

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*
          generate_release_notes: true
          draft: false
          prerelease: false
